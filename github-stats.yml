name: Generate GitHub Stats SVG

on:
  schedule:
    - cron: "0 6 * * *"   # ogni giorno alle 6:00 UTC
  workflow_dispatch:        # eseguibile manualmente dalla tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate stats SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: mgiorgi13
        run: python .github/scripts/generate_stats.py

      - name: Commit and push SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg
          git diff --cached --quiet || git commit -m "chore: update GitHub stats [skip ci]"
          git push
